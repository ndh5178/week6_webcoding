<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServicePanel Preview</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .controls {
      padding: 12px 20px;
      background: #1a1a2e;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls button {
      padding: 8px 16px;
      border-radius: 20px;
      border: none;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .controls button:hover { opacity: 0.85; }
    .btn-insert { background: linear-gradient(135deg, #FD267A, #FF6036); color: #fff; }
    .btn-select { background: #7C3AED; color: #fff; }
    .btn-delete { background: #DC2626; color: #fff; }
    .btn-error { background: #666; color: #fff; }
    .btn-loading { background: #0891B2; color: #fff; }
    .btn-reset { background: #333; color: #fff; }
    .controls-label { color: #999; font-size: 11px; font-weight: 600; letter-spacing: 1px; }
    .preview-frame {
      flex: 1;
      display: flex;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }
    .panel-container {
      width: 400px;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      border: 1px solid #E8E8E8;
    }
  </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ── ServicePanel 코드 (인라인) ──────────────────────────

const BANNER_THEMES = {
  INSERT: { icon: "\uD83D\uDC98", text: "NEW MATCH!" },
  SELECT: { icon: "\uD83D\uDD25", text: "MATCH RESULTS" },
  DELETE: { icon: "\uD83D\uDC94", text: "GHOSTED" },
  ERROR: { icon: "\u26A0\uFE0F", text: "ERROR" },
};

function ServicePanel({ rows = [], queryType = "", message = "", loading = false, error = null }) {
  const [animKey, setAnimKey] = useState(0);
  useEffect(() => { setAnimKey((k) => k + 1); }, [rows, queryType]);

  if (loading) {
    return (
      <div style={styles.panel}>
        <div style={styles.header}>
          <div style={styles.iconWrap}><span style={styles.iconText}>{"\uD83D\uDD25"}</span></div>
          <div><div style={styles.label}>SERVICE</div><div style={styles.desc}>Match Results</div></div>
        </div>
        <div style={styles.welcome}>
          <div style={{ ...styles.welcomeFlame, animation: "spin 1s linear infinite" }}>{"\u23F3"}</div>
          <div style={styles.welcomeTitle}>Loading...</div>
          <div style={styles.welcomeDesc}>쿼리 실행 중입니다</div>
        </div>
        <style>{keyframes}</style>
      </div>
    );
  }

  if (error) {
    return (
      <div style={styles.panel}>
        <div style={styles.header}>
          <div style={styles.iconWrap}><span style={styles.iconText}>{"\uD83D\uDD25"}</span></div>
          <div><div style={styles.label}>SERVICE</div><div style={styles.desc}>Match Results</div></div>
        </div>
        <div style={styles.banner} key={`err-${animKey}`}>
          <span style={styles.bannerIcon}>{"\u26A0\uFE0F"}</span>
          <span style={styles.bannerText}>ERROR</span>
        </div>
        <div style={styles.statusBar}>
          <span style={styles.badge}>ERROR</span>
          <span style={styles.statusMsg}>{error}</span>
        </div>
        <div style={styles.noData}>
          <div style={{ fontSize: 32, opacity: 0.3 }}>{"\uD83D\uDC94"}</div>
          <div>Something went wrong</div>
        </div>
        <style>{keyframes}</style>
      </div>
    );
  }

  if (!rows.length && !message) {
    return (
      <div style={styles.panel}>
        <div style={styles.header}>
          <div style={styles.iconWrap}><span style={styles.iconText}>{"\uD83D\uDD25"}</span></div>
          <div><div style={styles.label}>SERVICE</div><div style={styles.desc}>Match Results</div></div>
        </div>
        <div style={styles.welcome}>
          <div style={styles.welcomeFlame}>{"\uD83D\uDD25"}</div>
          <div style={styles.welcomeTitle}>Cupid-DB</div>
          <div style={styles.welcomeDesc}>SQL을 실행하면<br/>매칭 결과가 여기에 표시됩니다</div>
        </div>
        <style>{keyframes}</style>
      </div>
    );
  }

  const theme = BANNER_THEMES[queryType] || { icon: "\u2699\uFE0F", text: queryType || "RESULT" };

  return (
    <div style={styles.panel}>
      <div style={styles.header}>
        <div style={styles.iconWrap}><span style={styles.iconText}>{"\uD83D\uDD25"}</span></div>
        <div><div style={styles.label}>SERVICE</div><div style={styles.desc}>Match Results</div></div>
      </div>
      <div style={styles.banner} key={`banner-${animKey}`}>
        <span style={styles.bannerIcon}>{theme.icon}</span>
        <span style={styles.bannerText}>{theme.text}</span>
      </div>
      {message && (
        <div style={styles.statusBar}>
          <span style={styles.badge}>{queryType}</span>
          <span style={styles.statusMsg}>{message}</span>
        </div>
      )}
      <div style={styles.cardsContainer}>
        {rows.length === 0 ? (
          <div style={styles.noData}>
            <div style={{ fontSize: 32, opacity: 0.3 }}>{"\uD83D\uDC94"}</div>
            <div>No profiles yet</div>
          </div>
        ) : (
          rows.map((row, i) => (
            <div key={row.id ?? i} style={{ ...styles.card, animationDelay: `${i * 0.06}s` }}>
              <div style={styles.cardTop}>
                <div style={styles.avatar}>{(row.author || "?")[0].toUpperCase()}</div>
                <div>
                  <div style={styles.name}>{row.author}</div>
                  <div style={styles.idLabel}>#{row.id}</div>
                </div>
              </div>
              <div style={styles.content}>{row.content}</div>
            </div>
          ))
        )}
      </div>
      <div style={styles.footer}>{rows.length > 0 ? `${rows.length} profile(s)` : ""}</div>
      <style>{keyframes}</style>
    </div>
  );
}

const keyframes = `
@keyframes slideDown { from { opacity: 0; transform: translateY(-100%); } to { opacity: 1; transform: translateY(0); } }
@keyframes cardPop { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
`;

const styles = {
  panel: { display: "flex", flexDirection: "column", height: "100%", borderLeft: "1px solid #E8E8E8", backgroundColor: "#FFFFFF", color: "#1A1A1A", fontFamily: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif", fontSize: 14, overflow: "hidden" },
  header: { padding: "14px 20px", display: "flex", alignItems: "center", gap: 10, background: "#F8F8F8", borderBottom: "1px solid #E8E8E8", flexShrink: 0 },
  iconWrap: { width: 28, height: 28, borderRadius: 8, background: "rgba(253, 38, 122, 0.15)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 },
  iconText: { fontSize: 14 },
  label: { fontSize: 13, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.5px", color: "#FD267A" },
  desc: { fontSize: 11, color: "#999999", fontWeight: 400 },
  banner: { padding: "16px 20px", background: "linear-gradient(135deg, #FD267A 0%, #FF6036 100%)", display: "flex", alignItems: "center", justifyContent: "center", gap: 10, animation: "slideDown 0.3s ease", flexShrink: 0 },
  bannerIcon: { fontSize: 22 },
  bannerText: { fontSize: 14, fontWeight: 800, color: "#fff", letterSpacing: 2, textTransform: "uppercase" },
  statusBar: { display: "flex", alignItems: "center", gap: 8, padding: "10px 20px", background: "#F8F8F8", borderBottom: "1px solid #E8E8E8", fontSize: 12, flexShrink: 0 },
  badge: { padding: "3px 10px", borderRadius: 20, background: "linear-gradient(135deg, #FD267A 0%, #FF6036 100%)", color: "#fff", fontWeight: 700, fontSize: 10, letterSpacing: "0.5px" },
  statusMsg: { color: "#666666" },
  cardsContainer: { flex: 1, overflowY: "auto", padding: "16px 20px", display: "flex", flexDirection: "column", gap: 12, background: "#FFFFFF" },
  card: { background: "#F8F8F8", borderRadius: 16, padding: 16, border: "1px solid #E8E8E8", animation: "cardPop 0.35s ease both", transition: "border-color 0.2s, box-shadow 0.2s", cursor: "default" },
  cardTop: { display: "flex", alignItems: "center", gap: 12 },
  avatar: { width: 44, height: 44, borderRadius: "50%", background: "linear-gradient(135deg, #FD267A 0%, #FF6036 100%)", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 18, color: "#fff", flexShrink: 0 },
  name: { fontWeight: 700, fontSize: 15, color: "#1A1A1A" },
  idLabel: { fontSize: 11, color: "#999999", fontWeight: 500 },
  content: { marginTop: 10, marginLeft: 56, fontSize: 14, color: "#666666", lineHeight: 1.6, padding: "10px 14px", background: "#F0F0F0", borderRadius: 12, borderTopLeftRadius: 4 },
  welcome: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flex: 1, gap: 12 },
  welcomeFlame: { width: 64, height: 64, borderRadius: "50%", background: "linear-gradient(135deg, #FD267A 0%, #FF6036 100%)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, opacity: 0.7 },
  welcomeTitle: { fontSize: 18, fontWeight: 800, background: "linear-gradient(135deg, #FD267A 0%, #FF6036 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text" },
  welcomeDesc: { color: "#999999", fontSize: 13, textAlign: "center", lineHeight: 1.5 },
  noData: { display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", flex: 1, color: "#999999", gap: 8 },
  footer: { padding: "10px 20px", borderTop: "1px solid #E8E8E8", background: "#F8F8F8", fontSize: 12, color: "#999999", textAlign: "right", fontWeight: 500, flexShrink: 0 },
};

// ── 미리보기 앱 ──────────────────────────────────────────

const MOCK_ROWS = [
  { id: 1, author: "kim", content: "hello" },
  { id: 2, author: "lee", content: "nice to meet you" },
  { id: 3, author: "park", content: "looking for someone" },
];

function App() {
  const [state, setState] = useState({ rows: [], queryType: "", message: "", loading: false, error: null });

  const setInsert = () => setState({
    rows: [MOCK_ROWS[0]],
    queryType: "INSERT",
    message: "Executed. New profile registered!",
    loading: false, error: null,
  });

  const setSelect = () => setState({
    rows: [...MOCK_ROWS],
    queryType: "SELECT",
    message: "3 match(es) found",
    loading: false, error: null,
  });

  const setDelete = () => setState({
    rows: [MOCK_ROWS[1], MOCK_ROWS[2]],
    queryType: "DELETE",
    message: "Ghosted! 'kim' removed",
    loading: false, error: null,
  });

  const setError = () => setState({
    rows: [], queryType: "", message: "",
    loading: false, error: "Syntax error: unexpected token",
  });

  const setLoading = () => setState({
    rows: [], queryType: "", message: "",
    loading: true, error: null,
  });

  const setReset = () => setState({
    rows: [], queryType: "", message: "",
    loading: false, error: null,
  });

  return (
    <>
      <div className="controls">
        <span className="controls-label">STATE:</span>
        <button className="btn-insert" onClick={setInsert}>INSERT</button>
        <button className="btn-select" onClick={setSelect}>SELECT</button>
        <button className="btn-delete" onClick={setDelete}>DELETE</button>
        <button className="btn-error" onClick={setError}>ERROR</button>
        <button className="btn-loading" onClick={setLoading}>LOADING</button>
        <button className="btn-reset" onClick={setReset}>WELCOME</button>
      </div>
      <div className="preview-frame">
        <div className="panel-container">
          <ServicePanel {...state} />
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
